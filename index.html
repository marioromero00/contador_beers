<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eurotrip UCL 26 🍺</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-size: 2rem; font-weight: 900;
      letter-spacing: 2px; color: #f5c518; text-transform: uppercase;
    }
    header p { color: #aaa; font-size: 0.9rem; margin-top: 4px; letter-spacing: 1px; }

    .cards {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center; width: 100%; max-width: 700px;
    }

    .card {
      background: #1a1a2e; border: 2px solid #2e2e50;
      border-radius: 20px; padding: 32px 28px;
      flex: 1; min-width: 260px; text-align: center;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: #f5c518; }

    .card .avatar { margin-bottom: 8px; }
    .card .avatar img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid #2e2e50; background: #2e2e50;
    }

    .card .name {
      font-size: 1.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 24px; color: #f5c518;
    }

    .counter-display {
      font-size: 5rem; font-weight: 900; line-height: 1;
      margin-bottom: 24px; color: #fff;
    }

    .btn-row { display: flex; gap: 12px; justify-content: center; }

    button {
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 1.4rem; font-weight: 700; width: 56px; height: 56px;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.92); }

    .btn-add { background: #f5c518; color: #0d0d1a; }
    .btn-add:hover { background: #ffd740; }
    .btn-sub { background: #2e2e50; color: #fff; }
    .btn-sub:hover { background: #3a3a6a; }

    .btn-reset {
      background: transparent; border: 1px solid #444; color: #666;
      font-size: 0.7rem; width: auto; height: auto; padding: 4px 10px;
      border-radius: 8px; margin-top: 16px;
      display: block; margin-left: auto; margin-right: auto;
    }
    .btn-reset:hover { color: #e74c3c; border-color: #e74c3c; }

    .total-section {
      margin-top: 36px; background: #1a1a2e; border: 2px solid #f5c518;
      border-radius: 20px; padding: 24px 48px; text-align: center;
      width: 100%; max-width: 700px;
    }
    .total-label { font-size: 0.85rem; letter-spacing: 2px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
    .total-number { font-size: 3.5rem; font-weight: 900; color: #f5c518; }
    .total-beers { font-size: 0.9rem; color: #666; margin-top: 6px; }

    .chart-section {
      margin-top: 28px; width: 100%; max-width: 700px;
      background: #1a1a2e; border: 2px solid #2e2e50;
      border-radius: 20px; padding: 24px 20px;
    }
    .chart-section h2 {
      font-size: 0.85rem; letter-spacing: 2px; color: #aaa;
      text-transform: uppercase; margin-bottom: 18px; text-align: center;
    }
    .chart-container { position: relative; height: 280px; }
    .chart-empty { text-align: center; color: #444; font-size: 0.85rem; padding: 80px 0; }

    .history { margin-top: 28px; width: 100%; max-width: 700px; }
    .history h2 {
      font-size: 0.85rem; letter-spacing: 2px; color: #555;
      text-transform: uppercase; margin-bottom: 12px; text-align: center;
    }

    .log-list {
      list-style: none; display: flex; flex-direction: column;
      gap: 6px; max-height: 220px; overflow-y: auto;
    }
    .log-list li {
      background: #111122; border-radius: 8px; padding: 8px 14px;
      font-size: 0.82rem; color: #888; display: flex; justify-content: space-between;
    }
    .log-list li span.who { color: #f5c518; font-weight: 600; }

    .clear-log {
      display: block; margin: 12px auto 0; background: transparent;
      border: none; color: #444; font-size: 0.75rem; cursor: pointer;
      text-decoration: underline; width: auto; height: auto;
      padding: 0; border-radius: 0;
    }
    .clear-log:hover { color: #e74c3c; }
  </style>
</head>
<body>

  <header>
    <h1>🍺 Eurotrip UCL 26</h1>
    <p>Beer Counter — Juanpa vs Mario</p>
  </header>

  <div class="cards">
    <div class="card" id="card-juanpa">
      <div class="avatar">
        <img src="juanpa.jpg" alt="Juanpa" onerror="this.style.display='none'">
      </div>
      <div class="name">Juanpa</div>
      <div class="counter-display" id="count-juanpa">0</div>
      <div class="btn-row">
        <button class="btn-sub" onclick="change('juanpa', -1)">−</button>
        <button class="btn-add" onclick="change('juanpa', 1)">🍺</button>
      </div>
      <button class="btn-reset" onclick="reset('juanpa')">reset</button>
    </div>

    <div class="card" id="card-mario">
      <div class="avatar">
        <img src="mario.jpg" alt="Mario" onerror="this.style.display='none'">
      </div>
      <div class="name">Mario</div>
      <div class="counter-display" id="count-mario">0</div>
      <div class="btn-row">
        <button class="btn-sub" onclick="change('mario', -1)">−</button>
        <button class="btn-add" onclick="change('mario', 1)">🍺</button>
      </div>
      <button class="btn-reset" onclick="reset('mario')">reset</button>
    </div>
  </div>

  <div class="total-section">
    <div class="total-label">Total Eurotrip</div>
    <div class="total-number" id="total">0</div>
    <div class="total-beers">cervezas entre los dos</div>
  </div>

  <div class="chart-section">
    <h2>Histórico por Día</h2>
    <div class="chart-container" id="chart-container">
      <canvas id="daily-chart"></canvas>
    </div>
    <p class="chart-empty" id="chart-empty" style="display:none">Sin datos todavía — ¡empieza a contar!</p>
  </div>

  <div class="history">
    <h2>Historial</h2>
    <ul class="log-list" id="log-list"></ul>
    <button class="clear-log" onclick="clearLog()">borrar historial</button>
  </div>

  <script>
    const DB_KEY  = 'eurotrip_ucl26';
    const LOG_KEY = 'eurotrip_ucl26_log';

    let chartInstance = null;

    // ── Storage ──────────────────────────────────────────────
    function loadDB()      { const r = localStorage.getItem(DB_KEY);  return r ? JSON.parse(r) : { juanpa: 0, mario: 0 }; }
    function saveDB(db)    { localStorage.setItem(DB_KEY,  JSON.stringify(db)); }
    function loadLog()     { const r = localStorage.getItem(LOG_KEY); return r ? JSON.parse(r) : []; }
    function saveLog(log)  { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }

    function todayISO() { return new Date().toISOString().split('T')[0]; }
    function formatDay(iso) { const [,m,d] = iso.split('-'); return `${d}/${m}`; }
    function capitalize(s)  { return s.charAt(0).toUpperCase() + s.slice(1); }

    // ── Seed data: 13-05 each drank 3 ────────────────────────
    function initSeedData() {
      const log = loadLog();
      if (log.some(e => e.date === '2026-05-13')) return;

      const seed = [];
      for (let i = 0; i < 3; i++) {
        seed.push({ who: 'juanpa', delta: 1, date: '2026-05-13', time: '20:00' });
        seed.push({ who: 'mario',  delta: 1, date: '2026-05-13', time: '20:00' });
      }
      saveLog([...seed, ...log]);

      const db = loadDB();
      if (db.juanpa === 0 && db.mario === 0) saveDB({ juanpa: 3, mario: 3 });
    }

    // ── Daily aggregation ─────────────────────────────────────
    function getDailyData() {
      const days = {};
      loadLog().forEach(entry => {
        const date = entry.date || todayISO();
        if (!days[date]) days[date] = { juanpa: 0, mario: 0 };
        if (entry.delta > 0) days[date][entry.who] += entry.delta;
      });
      return days;
    }

    // ── Chart ─────────────────────────────────────────────────
    function getDateRange() {
      const dates = [];
      const cur = new Date('2026-05-13');
      const end = new Date('2026-06-01');
      while (cur <= end) {
        dates.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
      }
      return dates;
    }

    function makeBeerCanvas() {
      const S = 18;
      const c = document.createElement('canvas');
      c.width = S; c.height = S;
      const ctx = c.getContext('2d');
      ctx.font = `${S - 2}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍺', S / 2, S / 2 + 1);
      return c;
    }

    function renderChart() {
      const allDates = getDateRange();
      const today    = todayISO();
      const dayData  = getDailyData();

      document.getElementById('chart-container').style.display = 'block';
      document.getElementById('chart-empty').style.display     = 'none';

      // last index with passed date — beer emoji goes here
      const last = allDates.reduce((acc, d, i) => d <= today ? i : acc, 0);
      const beer = makeBeerCanvas();

      const ptStyle  = i => i === last ? beer : 'circle';
      const ptRadius = i => i === last ? 9 : (i < last ? 3 : 0);

      // cumulative totals; null for future dates
      let sumJ = 0, sumM = 0;
      const juanpaData = allDates.map(d => {
        if (d > today) return null;
        sumJ += dayData[d]?.juanpa ?? 0;
        return sumJ;
      });
      const marioData = allDates.map(d => {
        if (d > today) return null;
        sumM += dayData[d]?.mario ?? 0;
        return sumM;
      });

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(
        document.getElementById('daily-chart').getContext('2d'),
        {
          type: 'line',
          data: {
            labels: allDates.map(formatDay),
            datasets: [
              {
                label: 'Juanpa',
                data: juanpaData,
                spanGaps: false,
                borderColor: '#f5c518',
                backgroundColor: 'rgba(245,197,24,0.12)',
                fill: true,
                tension: 0.35,
                pointStyle:          allDates.map((_, i) => ptStyle(i)),
                pointRadius:         allDates.map((_, i) => ptRadius(i)),
                pointHoverRadius:    allDates.map((_, i) => ptRadius(i) + 2),
                pointBackgroundColor: '#f5c518',
                pointBorderColor:    '#0d0d1a',
                pointBorderWidth: 2,
              },
              {
                label: 'Mario',
                data: marioData,
                spanGaps: false,
                borderColor: '#4e9af1',
                backgroundColor: 'rgba(78,154,241,0.12)',
                fill: true,
                tension: 0.35,
                pointStyle:          allDates.map((_, i) => ptStyle(i)),
                pointRadius:         allDates.map((_, i) => ptRadius(i)),
                pointHoverRadius:    allDates.map((_, i) => ptRadius(i) + 2),
                pointBackgroundColor: '#4e9af1',
                pointBorderColor:    '#0d0d1a',
                pointBorderWidth: 2,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { color: '#aaa', font: { size: 12 } } },
              tooltip: {
                callbacks: { label: c => c.parsed.y !== null ? ` ${c.dataset.label}: ${c.parsed.y} 🍺 total` : '' }
              }
            },
            scales: {
              x: {
                ticks: {
                  color: '#888',
                  font: { size: 10 },
                  maxRotation: 45,
                  minRotation: 45,
                  autoSkip: false,
                },
                grid: { color: '#1e1e3a' }
              },
              y: {
                beginAtZero: true,
                max: 70,
                ticks: { color: '#888', stepSize: 10, precision: 0 },
                grid: { color: '#1e1e3a' }
              }
            }
          }
        }
      );
    }

    // ── Render ────────────────────────────────────────────────
    function render() {
      const db = loadDB();
      document.getElementById('count-juanpa').textContent = db.juanpa;
      document.getElementById('count-mario').textContent  = db.mario;
      document.getElementById('total').textContent = db.juanpa + db.mario;
      renderLog();
      renderChart();
    }

    function renderLog() {
      const log = loadLog();
      const el  = document.getElementById('log-list');
      el.innerHTML = '';
      [...log].reverse().forEach(entry => {
        const li    = document.createElement('li');
        const label = entry.delta > 0 ? '+1 cerveza 🍺' : '-1 cerveza';
        const date  = entry.date ? `${formatDay(entry.date)} ` : '';
        li.innerHTML = `<span class="who">${capitalize(entry.who)}</span><span>${label} — ${date}${entry.time}</span>`;
        el.appendChild(li);
      });
    }

    function change(who, delta) {
      const db = loadDB();
      db[who] = Math.max(0, db[who] + delta);
      saveDB(db);

      const log = loadLog();
      log.push({
        who, delta,
        date: todayISO(),
        time: new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
      });
      if (log.length > 300) log.shift();
      saveLog(log);
      render();
    }

    function reset(who) {
      if (!confirm(`¿Resetear el contador de ${capitalize(who)}?`)) return;
      const db = loadDB();
      db[who] = 0;
      saveDB(db);
      render();
    }

    function clearLog() {
      if (!confirm('¿Borrar todo el historial?')) return;
      localStorage.removeItem(LOG_KEY);
      render();
    }

    // ── Boot ──────────────────────────────────────────────────
    initSeedData();
    render();
  </script>
</body>
</html>
